<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_53 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_53" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_53');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.set(0, 2, 10);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xd4af37, 2); // Gold light
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

const blueLight = new THREE.PointLight(0x3a3939, 1);
blueLight.position.set(-5, 2, 2);
scene.add(blueLight);

// Creating a "Big Building" - Abstract Architectural Form
const buildingGroup = new THREE.Group();

const createTower = (w, h, d, x, z, color) => {
    const geometry = new THREE.BoxGeometry(w, h, d);
    const material = new THREE.MeshPhongMaterial({ 
        color: color, 
        transparent: true, 
        opacity: 0.8,
        shininess: 100
    });
    const tower = new THREE.Mesh(geometry, material);
    tower.position.set(x, h/2, z);
    
    // Wireframe for "tech" look
    const wireframeGeom = new THREE.EdgesGeometry(geometry);
    const wireframeMat = new THREE.LineBasicMaterial({ color: 0xd4af37, transparent: true, opacity: 0.3 });
    const wireframe = new THREE.LineSegments(wireframeGeom, wireframeMat);
    tower.add(wireframe);
    
    return tower;
};

// Central Skyscrapers
buildingGroup.add(createTower(2, 8, 2, 0, 0, 0x1c1b1b));
buildingGroup.add(createTower(1.5, 6, 1.5, -2.5, -1, 0x1c1b1b));
buildingGroup.add(createTower(1.5, 5, 1.5, 2.5, -1, 0x1c1b1b));

// Floating "Trading Candles" / Financial Bars
const financeGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
    const h = 1 + Math.random() * 3;
    const geom = new THREE.BoxGeometry(0.3, h, 0.3);
    const mat = new THREE.MeshPhongMaterial({ 
        color: Math.random() > 0.5 ? 0xd4af37 : 0xffffff,
        emissive: Math.random() > 0.5 ? 0xd4af37 : 0x000000,
        emissiveIntensity: 0.2
    });
    const bar = new THREE.Mesh(geom, mat);
    const angle = (i / 12) * Math.PI * 2;
    const radius = 6;
    bar.position.set(Math.cos(angle) * radius, h/2 - 1, Math.sin(angle) * radius);
    financeGroup.add(bar);
}

scene.add(buildingGroup);
scene.add(financeGroup);

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const elapsedTime = clock.getElapsedTime();

    buildingGroup.rotation.y = elapsedTime * 0.1;
    financeGroup.rotation.y = -elapsedTime * 0.15;

    // Gentle floating for buildings
    buildingGroup.position.y = Math.sin(elapsedTime * 0.5) * 0.2;

    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_53 -->
</body>
</html>
